<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  background: white;
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 30px;
  border-bottom: 3px solid #1a56db;
}
.header h1 {
  color: #1a56db;
  font-size: 2.5rem;
  margin-bottom: 10px;
}
.header p {
  color: #64748b;
  font-size: 1.1rem;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.stat-card {
  background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%);
  color: white;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
}
.stat-card .icon {
  font-size: 3rem;
  margin-bottom: 10px;
}
.stat-card .number {
  font-size: 2.5rem;
  font-weight: 900;
  margin-bottom: 5px;
}
.stat-card .label {
  font-size: 0.9rem;
  opacity: 0.9;
}
.hospital-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 30px;
}
.hospital-card {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px;
  transition: all 0.3s;
  cursor: pointer;
}
.hospital-card:hover {
  border-color: #1a56db;
  box-shadow: 0 4px 16px rgba(26,86,219,0.2);
  transform: translateY(-2px);
}
.hospital-card h3 {
  color: #1a56db;
  font-size: 1.1rem;
  margin-bottom: 10px;
}
.hospital-card .city {
  color: #64748b;
  font-size: 0.9rem;
  margin-bottom: 15px;
}
.hospital-card .equipment {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.equipment-badge {
  background: #dcfce7;
  color: #065f46;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
}
.btn {
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: 700;
  font-size: 1rem;
  margin: 10px 5px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}
.btn:hover {
  transform: translateY(-2px);
}
.search-box {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 1rem;
  margin-bottom: 20px;
}
.search-box:focus {
  outline: none;
  border-color: #1a56db;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏥 Hospital Management System</h1>
    <p>Fremenatos Trading PLC - Customer Portal</p>
  </div>

  <div class="stats" id="statsContainer">
    <div class="stat-card">
      <div class="icon">🏥</div>
      <div class="number" id="totalHospitals">0</div>
      <div class="label">Total Hospitals</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
      <div class="icon">📝</div>
      <div class="number" id="totalSummaries">0</div>
      <div class="label">Hospital Summaries</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
      <div class="icon">🌆</div>
      <div class="number" id="totalCities">0</div>
      <div class="label">Cities</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);">
      <div class="icon">📋</div>
      <div class="number" id="totalReports">0</div>
      <div class="label">Visit Reports</div>
    </div>
  </div>

  <div style="text-align: center; margin-bottom: 30px;">
    <button class="btn" onclick="window.location.href='app/sales.html'">💼 Open Sales Dashboard</button>
    <button class="btn" onclick="window.location.href='login.html'" style="background: linear-gradient(135deg, #059669 0%, #047857 100%);">🔐 Login Page</button>
  </div>

  <div>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search hospitals by name or city..." oninput="filterHospitals()">
  </div>

  <div class="hospital-grid" id="hospitalGrid"></div>
</div>

<script>
// Load data from localStorage
function loadData() {
  try {
    const potentials = JSON.parse(localStorage.getItem('fremenatos_potentials') || '[]');
    const reports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
    const machine = JSON.parse(localStorage.getItem('fremenatos_machine') || '[]');
    const external = JSON.parse(localStorage.getItem('fremenatos_external') || '[]');
    const summaries = JSON.parse(localStorage.getItem('fremenatos_facility_summaries') || '{}');
    
    // Combine all hospitals
    const allHospitals = [...potentials, ...reports, ...machine, ...external];
    
    // Get unique cities
    const cities = [...new Set(allHospitals.map(h => h.city || h.location).filter(Boolean))];
    
    // Update stats
    document.getElementById('totalHospitals').textContent = allHospitals.length;
    document.getElementById('totalSummaries').textContent = Object.keys(summaries).length;
    document.getElementById('totalCities').textContent = cities.length;
    document.getElementById('totalReports').textContent = reports.length;
    
    // Store for filtering
    window.hospitalsData = allHospitals;
    
    // Display hospitals
    displayHospitals(allHospitals);
    
  } catch (e) {
    console.error('Error loading data:', e);
    document.getElementById('hospitalGrid').innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: #fee2e2; border-radius: 12px; color: #991b1b;">
        <h3>⚠️ Error Loading Data</h3>
        <p>${e.message}</p>
        <p style="margin-top: 20px;">Please import your hospital data first.</p>
      </div>
    `;
  }
}

function displayHospitals(hospitals) {
  const grid = document.getElementById('hospitalGrid');
  
  if (hospitals.length === 0) {
    grid.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: #f1f5f9; border-radius: 12px;">
        <h3>No hospitals found</h3>
        <p>Try a different search term or import data</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = hospitals.slice(0, 50).map((h, i) => `
    <div class="hospital-card" onclick="alert('Hospital: ${h.name || h.hospitalName}\\nCity: ${h.city || h.location}')">
      <h3>${h.name || h.hospitalName || 'Unknown Hospital'}</h3>
      <div class="city">📍 ${h.city || h.location || 'Unknown City'}</div>
      <div class="equipment">
        ${h.chemistryAnalyzer || h.chemistry ? '<span class="equipment-badge">🧪 Chemistry</span>' : ''}
        ${h.hormoneAnalyzer || h.hormone ? '<span class="equipment-badge">💉 Hormone</span>' : ''}
        ${h.electrolyteAnalyzer || h.electrolyte ? '<span class="equipment-badge">⚡ Electrolyte</span>' : ''}
      </div>
    </div>
  `).join('');
  
  if (hospitals.length > 50) {
    grid.innerHTML += `
      <div style="grid-column: 1/-1; text-align: center; padding: 20px; background: #fef3c7; border-radius: 12px; color: #92400e;">
        <strong>Showing first 50 of ${hospitals.length} hospitals</strong>
      </div>
    `;
  }
}

function filterHospitals() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const filtered = window.hospitalsData.filter(h => {
    const name = (h.name || h.hospitalName || '').toLowerCase();
    const city = (h.city || h.location || '').toLowerCase();
    return name.includes(search) || city.includes(search);
  });
  displayHospitals(filtered);
}

// Load data on page load
window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
