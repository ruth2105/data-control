async function importEphrataSummaries() {
  // Import from existing tool data
  const response = await fetch('tools/import/import-ephrata-summaries.html');
  const html = await response.text();
  
  // Extract CSV data from the HTML
  const csvMatch = html.match(/const CSV_DATA = `([\\s\\S]*?)`/);
  if (!csvMatch) throw new Error('Could not find Ephrata CSV data');
  
  const csvData = csvMatch[1];
  const lines = csvData.trim().split('\\n');
  const summaries = {};
  
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',');
    if (parts.length >= 2) {
      const name = parts[0];
      const summary = parts.slice(1).join(',');
      summaries[name] = summary;
    }
  }
  
  // Save to localStorage
  const existing = JSON.parse(localStorage.getItem('fremenatos_facility_summaries') || '{}');
  Object.assign(existing, summaries);
  localStorage.setItem('fremenatos_facility_summaries', JSON.stringify(existing));
  
  return summaries;
}

// NEW: Import main customer CSV data
async function importMainCustomerCSV() {
  const response = await fetch('data/csv/final customer.csv');
  const csvText = await response.text();
  
  const lines = csvText.trim().split('\\n');
  const customers = [];
  
  // Skip header rows (first 2 lines)
  for (let i = 2; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    // Parse CSV (handle quoted fields)
    const fields = parseCSVLine(line);
    if (fields.length < 11) continue; // Need at least 11 fields
    
    const customer = {
      id: fields[0],
      name: fields[1],
      nameZh: fields[2],
      city: fields[3],
      model: fields[4],
      installDate: fields[5],
      specialty: fields[6] || '',
      ownership: fields[7] || 'Private',
      contactRole: fields[8] || '',
      contact: fields[9] || '',
      phone: fields[10] || '',
      stock: fields[11] || '',
      orders: fields[12] || '',
      doctors: fields[13] || '',
      paymentContact: fields[14] || '',
      salesRep: determineSalesRep(fields[3], fields[1]), // Determine from city/name
      status: 'warm', // Default status
      type: fields[4] === 'A8' ? 'machine' : 'external' // A8 = machine, A90 = external
    };
    
    customers.push(customer);
  }
  
  // Save to localStorage by type
  const machineCustomers = customers.filter(c => c.type === 'machine');
  const externalCustomers = customers.filter(c => c.type === 'external');
  
  localStorage.setItem('fremenatos_machine', JSON.stringify(machineCustomers));
  localStorage.setItem('fremenatos_external', JSON.stringify(externalCustomers));
  
  return customers;
}

// Helper: Parse CSV line (handles quoted commas)
function parseCSVLine(line) {
  const fields = [];
  let current = '';
  let inQuotes = false;
  
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    
    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      fields.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  
  fields.push(current.trim());
  return fields;
}

// Helper: Determine sales rep from city or hospital name
function determineSalesRep(city, name) {
  const cityLower = city.toLowerCase();
  const nameLower = name.toLowerCase();
  
  // Ephrata's territory
  if (cityLower.includes('addis') || cityLower.includes('a.a')) {
    return 'Ephrata';
  }
  
  // Kalkidan's territory (specific hospitals)
  if (nameLower.includes('lotus') || nameLower.includes('novamed') || 
      nameLower.includes('tersis') || nameLower.includes('yerer')) {
    return 'Kalkidan';
  }
  
  // Tizita's territory
  if (cityLower.includes('jimma') || cityLower.includes('asella')) {
    return 'Tizita';
  }
  
  return 'Admin'; // Default
}

// NEW: Import Kalkidan facilities CSV
async function importKalkidanFacilities() {
  try {
    const response = await fetch('data/csv/KALKIDAN_FACILITIES_DATA.csv');
    const csvText = await response.text();
    
    const lines = csvText.trim().split('\\n');
    const facilities = [];
    
    // Parse CSV (skip header)
    for (let i = 1; i < lines.length; i++) {
      const fields = parseCSVLine(lines[i]);
      if (fields.length < 5) continue;
      
      facilities.push({
        name: fields[0],
        city: fields[1] || 'Addis Ababa',
        contact: fields[2] || '',
        phone: fields[3] || '',
        patientLoad: fields[4] || '5-10 tests/day',
        salesRep: 'Kalkidan',
        status: 'warm',
        specialty: fields[5] || ''
      });
    }
    
    // Merge with existing potentials
    const existing = JSON.parse(localStorage.getItem('fremenatos_potentials') || '[]');
    facilities.forEach(f => {
      if (!existing.some(e => e.name.toLowerCase() === f.name.toLowerCase())) {
        existing.push(f);
      }
    });
    
    localStorage.setItem('fremenatos_potentials', JSON.stringify(existing));
    return facilities;
  } catch (error) {
    console.warn('Could not load Kalkidan facilities CSV:', error.message);
    return [];
  }
}

function consolidateData() {
  const potentials = JSON.parse(localStorage.getItem('fremenatos_potentials') || '[]');
  const reports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
  const summaries = JSON.parse(localStorage.getItem('fremenatos_facility_summaries') || '{}');
  
  // Count hardcoded hospitals (29 in index.html)
  const hardcodedCount = 29;
  
  return {
    hospitals: hardcodedCount + potentials.length,
    summaries: Object.keys(summaries).length,
    reports: reports.length
  };
}

function clearAll() {
  if (!confirm('⚠️ This will DELETE ALL data! Are you absolutely sure?')) return;
  if (!confirm('Really sure? This cannot be undone!')) return;
  
  localStorage.removeItem('fremenatos_potentials');
  localStorage.removeItem('fremenatos_visitReports');
  localStorage.removeItem('fremenatos_machine');
  localStorage.removeItem('fremenatos_external');
  localStorage.removeItem('fremenatos_facility_summaries');
  
  alert('✅ All data cleared!');
  checkData();
}

// Auto-check on load
window.addEventListener('DOMContentLoaded', checkData);
</script>
