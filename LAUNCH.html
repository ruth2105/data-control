<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Hospital Management System</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            color: #1a56db;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #1a56db, #1e40af);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .instructions {
            color: #64748b;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Hospital Management System</h1>
        <p style="color: #64748b; margin-bottom: 20px;">
            Click the button below to launch the application
        </p>
        <a href="index.html" class="btn">🚀 Launch Application</a>
        
        <div class="instructions">
            <strong>Default Login Credentials:</strong><br>
            Admin: <code>admin</code> / <code>admin123</code><br>
            Sales Team 1: <code>sales1</code> / <code>team1</code><br>
            Sales Team 2: <code>sales2</code> / <code>team2</code><br>
            Sales Team 3: <code>sales3</code> / <code>team3</code>
        </div>
    </div>
</body>
</html>
