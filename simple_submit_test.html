<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Submit Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #059669;
        }
        label {
            font-weight: 600;
            color: #334155;
            display: block;
            margin-top: 10px;
        }
        .result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #dc2626;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#1a56db">📝 Simple Submit Test</h1>
        <p>This will test if report submission works AT ALL.</p>
    </div>

    <div class="card">
        <h2>Step 1: Fill Minimal Data</h2>
        <form id="testForm">
            <label>Salesperson *</label>
            <select id="salesPerson" required>
                <option value="">-- Select --</option>
                <option value="Ephrata Tekola">Ephrata Tekola</option>
                <option value="Kalkidan Awoke">Kalkidan Awoke</option>
                <option value="Tizita Tarekeg">Tizita Tarekeg</option>
            </select>

            <label>Hospital Name *</label>
            <input type="text" id="hospitalName" value="Test Hospital" required>

            <label>Hospital Address *</label>
            <input type="text" id="hospitalAddress" value="Bole, Addis Ababa" required>

            <label>Phone</label>
            <input type="text" id="phone" value="0911234567">

            <label>Date *</label>
            <input type="date" id="fillDate" required>

            <button type="button" onclick="testLocalSave()">💾 Test 1: Save to Local Storage</button>
            <button type="button" onclick="testGoogleSave()">☁️ Test 2: Save to Google Sheets</button>
            <button type="button" onclick="checkSavedData()">🔍 Test 3: Check Saved Data</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwd3Xpe2LTQeJ84XCWpJ-HTepFOC2aLSB-aSJJ6Ff0atg1ISiIW9E8Sl295qnKYghVIvQ/exec';

        // Set today's date
        document.getElementById('fillDate').valueAsDate = new Date();

        function showResult(message, type) {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            result.innerHTML = message;
        }

        function testLocalSave() {
            try {
                const data = {
                    id: Date.now(),
                    salesPerson: document.getElementById('salesPerson').value,
                    hospitalName: document.getElementById('hospitalName').value,
                    hospitalAddress: document.getElementById('hospitalAddress').value,
                    phone: document.getElementById('phone').value,
                    fillDate: document.getElementById('fillDate').value,
                    submittedAt: new Date().toISOString()
                };

                if (!data.salesPerson) {
                    showResult('❌ Please select a salesperson!', 'error');
                    return;
                }

                // Save to local storage
                let reports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
                reports.push(data);
                localStorage.setItem('fremenatos_visitReports', JSON.stringify(reports));

                showResult(`✅ SUCCESS!\n\nSaved to local storage!\nTotal reports: ${reports.length}\n\nNow try "Test 2" to save to Google Sheets.`, 'success');
            } catch (error) {
                showResult('❌ LOCAL SAVE FAILED\n\n' + error.message, 'error');
            }
        }

        async function testGoogleSave() {
            try {
                const data = {
                    action: 'insert',
                    id: Date.now(),
                    salesPerson: document.getElementById('salesPerson').value,
                    hospitalName: document.getElementById('hospitalName').value,
                    hospitalAddress: document.getElementById('hospitalAddress').value,
                    phone: document.getElementById('phone').value,
                    fillDate: document.getElementById('fillDate').value,
                    submittedAt: new Date().toISOString()
                };

                if (!data.salesPerson) {
                    showResult('❌ Please select a salesperson!', 'error');
                    return;
                }

                showResult('⏳ Sending to Google Sheets...', 'success');

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                console.log('Google response:', result);

                if (result.status === 'ok') {
                    showResult(`✅ SUCCESS!\n\nSaved to Google Sheets!\nResponse: ${JSON.stringify(result)}\n\nNow try "Test 3" to verify data.`, 'success');
                } else {
                    showResult(`⚠️ GOOGLE SHEETS RESPONSE:\n\n${JSON.stringify(result, null, 2)}\n\nStatus: ${result.status}\nMessage: ${result.message || 'Unknown'}`, 'error');
                }
            } catch (error) {
                showResult('❌ GOOGLE SAVE FAILED\n\n' + error.message + '\n\nPossible reasons:\n1. No internet connection\n2. Google Apps Script not deployed\n3. SCRIPT_URL incorrect\n4. CORS policy blocking', 'error');
            }
        }

        function checkSavedData() {
            try {
                // Check local storage
                const localReports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
                
                let message = '📊 DATA CHECK RESULTS:\n\n';
                message += `🗄️ Local Storage: ${localReports.length} reports\n`;
                
                if (localReports.length > 0) {
                    message += `\nLast report:\n`;
                    message += `- Hospital: ${localReports[localReports.length - 1].hospitalName}\n`;
                    message += `- Date: ${localReports[localReports.length - 1].fillDate}\n`;
                    message += `- Salesperson: ${localReports[localReports.length - 1].salesPerson}\n`;
                }

                // Try to check Google Sheets
                fetch(SCRIPT_URL)
                    .then(r => r.json())
                    .then(res => {
                        if (res.status === 'ok' && res.data) {
                            message += `\n☁️ Google Sheets: ${res.data.length} reports\n`;
                            
                            if (res.data.length > 0) {
                                message += `\nLast report in Google:\n`;
                                message += `- Hospital: ${res.data[res.data.length - 1].hospitalName}\n`;
                                message += `- Date: ${res.data[res.data.length - 1].fillDate}\n`;
                            }
                        } else {
                            message += `\n☁️ Google Sheets: Cannot read or empty\n`;
                        }
                        
                        showResult(message, localReports.length > 0 ? 'success' : 'error');
                    })
                    .catch(err => {
                        message += `\n☁️ Google Sheets: Connection failed\n`;
                        showResult(message, localReports.length > 0 ? 'success' : 'error');
                    });

                if (localReports.length === 0) {
                    showResult(message + '\n\n❌ No data found anywhere!\nTry Test 1 first.', 'error');
                }
            } catch (error) {
                showResult('❌ CHECK FAILED\n\n' + error.message, 'error');
            }
        }

        // Auto-check on page load
        window.onload = function() {
            setTimeout(checkSavedData, 500);
        };
    </script>
</body>
</html>
