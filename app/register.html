<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Fremenatos Trading PLC</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.register-container {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 500px;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-circle {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 900;
  color: white;
  margin: 0 auto 16px;
  border: 4px solid #f0f0f0;
}

h1 {
  font-size: 1.8rem;
  color: #1e293b;
  text-align: center;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #64748b;
  font-size: 0.95rem;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: #475569;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, select {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 1rem;
  transition: all 0.2s;
  font-family: inherit;
}

input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.btn-register {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s;
  margin-top: 8px;
}

.btn-register:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.btn-register:active {
  transform: translateY(0);
}

.alert {
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  display: none;
  font-size: 0.9rem;
  font-weight: 500;
}

.alert.success {
  background: #dcfce7;
  color: #166534;
  border: 2px solid #86efac;
}

.alert.error {
  background: #fee2e2;
  color: #991b1b;
  border: 2px solid #fca5a5;
}

.alert.info {
  background: #dbeafe;
  color: #1e40af;
  border: 2px solid #93c5fd;
}

.back-link {
  text-align: center;
  margin-top: 24px;
  font-size: 0.9rem;
}

.back-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
}

.back-link a:hover {
  text-decoration: underline;
}

.info-box {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 24px;
  font-size: 0.85rem;
  color: #64748b;
  line-height: 1.6;
}

.info-box strong {
  color: #1e293b;
}
</style>
</head>
<body>

<div class="register-container">
  <div class="logo">
    <div class="logo-circle">弗</div>
    <h1>New Sales Registration</h1>
    <p class="subtitle">Create your account</p>
  </div>

  <div id="alertBox" class="alert"></div>

  <form id="registerForm">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="fullName" placeholder="e.g., Abebe Kebede" required>
    </div>

    <div class="form-group">
      <label>Choose Username *</label>
      <input type="text" id="username" placeholder="e.g., abebe" required pattern="[a-zA-Z0-9]+" title="Only letters and numbers">
      <small style="color:#64748b;font-size:0.8rem">Letters and numbers only, no spaces</small>
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password" id="password" placeholder="Choose a strong password" required minlength="6">
      <small style="color:#64748b;font-size:0.8rem">Minimum 6 characters</small>
    </div>

    <div class="form-group">
      <label>Confirm Password *</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g., 0911123456">
    </div>

    <button type="submit" class="btn-register">📝 Submit Registration</button>
  </form>

  <div class="back-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
// API URL - shared with the admin dashboard and sales pages
const API_URL = '/.netlify/functions/proxy';
// LOCAL_USERS_KEY is already defined in auth.js

function loadLocalUsers() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_USERS_KEY) || '[]');
  } catch (error) {
    return [];
  }
}

function saveLocalUsers(users) {
  localStorage.setItem(LOCAL_USERS_KEY, JSON.stringify(users));
}

function saveLocalUser(user) {
  const users = loadLocalUsers();
  const existingIndex = users.findIndex(u => u.username === user.username);
  if (existingIndex >= 0) {
    users[existingIndex] = { ...users[existingIndex], ...user };
  } else {
    users.push(user);
  }
  saveLocalUsers(users);
  queuePendingSync('registration', user);
  syncPendingData();
}

let pendingSyncInProgress = false;

function queuePendingSync(type, payload) {
  try {
    const queue = JSON.parse(localStorage.getItem('fremenatos_pendingSync') || '[]');
    const entryId = payload && (payload.id || payload.username || payload.username || `${type}-${Date.now()}`);
    const existingIndex = queue.findIndex(item => item.id === entryId || (item.type === type && item.payload && item.payload.username && payload && payload.username && item.payload.username === payload.username));

    if (existingIndex >= 0) {
      queue[existingIndex].payload = payload;
      queue[existingIndex].updatedAt = new Date().toISOString();
      localStorage.setItem('fremenatos_pendingSync', JSON.stringify(queue));
      return queue[existingIndex];
    }

    queue.push({
      id: entryId,
      type: type,
      payload: payload,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      attempts: 0
    });

    localStorage.setItem('fremenatos_pendingSync', JSON.stringify(queue));
    return queue[queue.length - 1];
  } catch (error) {
    console.error('queuePendingSync error', error);
    return null;
  }
}

function removePendingSync(entryId) {
  try {
    const queue = JSON.parse(localStorage.getItem('fremenatos_pendingSync') || '[]');
    const filtered = queue.filter(item => item.id !== entryId);
    localStorage.setItem('fremenatos_pendingSync', JSON.stringify(filtered));
  } catch (error) {
    console.error('removePendingSync error', error);
  }
}

async function syncPendingData() {
  if (pendingSyncInProgress) return;
  pendingSyncInProgress = true;

  try {
    const queue = JSON.parse(localStorage.getItem('fremenatos_pendingSync') || '[]');
    if (!queue.length) return;

    for (const item of [...queue]) {
      try {
        if (item.type === 'registration') {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(item.payload)
          });
          const data = await response.json();
          if (data && (data.status === 'success' || data.status === 'ok' || data.success === true)) {
            removePendingSync(item.id);
          }
        } else if (item.type === 'visitReport') {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(item.payload)
          });
          const data = await response.json();
          if (data && (data.status === 'success' || data.status === 'ok' || data.success === true)) {
            removePendingSync(item.id);
          }
        }
      } catch (error) {
        console.warn('Pending sync failed, will retry later:', error);
      }
    }
  } catch (error) {
    console.error('syncPendingData error', error);
  } finally {
    pendingSyncInProgress = false;
  }
}

window.addEventListener('online', () => syncPendingData());
window.addEventListener('load', () => syncPendingData());

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const fullName = document.getElementById('fullName').value.trim();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const phone = document.getElementById('phone').value.trim();
  
  // Automatically assign random team (1-6)
  const preferredTeam = String(Math.floor(Math.random() * 6) + 1);
  
  // Validation
  if (password !== confirmPassword) {
    showAlert('error', '❌ Passwords do not match!');
    return;
  }
  
  if (password.length < 6) {
    showAlert('error', '❌ Password must be at least 6 characters!');
    return;
  }
  
  if (!/^[a-zA-Z0-9]+$/.test(username)) {
    showAlert('error', '❌ Username can only contain letters and numbers!');
    return;
  }
  
  // Show loading
  const btn = document.querySelector('.btn-register');
  const originalText = btn.textContent;
  btn.textContent = '⏳ Submitting...';
  btn.disabled = true;
  
  const registrationData = {
    action: 'registerUser',
    username: username,
    password: password,
    name: fullName,
    nameZh: fullName,
    phone: phone,
    email: '',  // Empty email
    preferredTeam: parseInt(preferredTeam),
    teamId: parseInt(preferredTeam),
    registeredAt: new Date().toISOString(),
    status: 'pending',
    role: 'sales'
  };

  // Log for debugging
  console.log('📝 Registering user:', {
    username: registrationData.username,
    name: registrationData.name,
    teamId: registrationData.teamId,
    status: registrationData.status,
    autoAssignedTeam: true
  });

  // Save locally first
  saveLocalUser(registrationData);
  
  console.log('✅ User saved to localStorage');
  
  // Verify it was saved
  const savedUsers = loadLocalUsers();
  const savedUser = savedUsers.find(u => u.username === username);
  console.log('🔍 Verification - User in localStorage:', savedUser);

  try {
    // Submit registration
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(registrationData)
    });
    
    const data = await response.json();
    
    if (data.status === 'success') {
      console.log('✅ Registration successful on server');
      clearSession();
      showAlert('success', '✅ Registration submitted successfully! Please wait for admin approval.');
      document.getElementById('registerForm').reset();
      
      // Redirect to login after 3 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
      
    } else {
      console.log('⚠️ Server returned:', data);
      showAlert('success', '✅ Registration saved! Please wait for admin approval. You can close this page.');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);
    }
    
  } catch (error) {
    console.error('❌ Registration network error:', error);
    showAlert('success', '✅ Registration saved! Please wait for admin approval. You can close this page.');
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 3000);
  }
});

function showAlert(type, message) {
  const alertBox = document.getElementById('alertBox');
  alertBox.className = 'alert ' + type;
  alertBox.textContent = message;
  alertBox.style.display = 'block';
  
  // Auto-hide after 5 seconds for warnings/errors
  if (type === 'error' || type === 'warning') {
    setTimeout(() => {
      alertBox.style.display = 'none';
    }, 5000);
  }
}
</script>

</body>
</html>
