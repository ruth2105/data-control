<title>Freminatos Trading PLC – Customer Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
/* HEADER */
.header{background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%);color:#fff;padding:0}
.header-inner{max-width:1280px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:16px}
.logo-circle{width:52px;height:52px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;border:2px solid rgba(255,255,255,0.4);flex-shrink:0}
.header-text h1{font-size:1.5rem;font-weight:800;letter-spacing:.5px}
.header-text p{font-size:.85rem;opacity:.8;margin-top:2px}
/* STATS BAR */
.stats-bar{background:#1a56db;border-top:1px solid rgba(255,255,255,0.15)}
.stats-inner{max-width:1280px;margin:0 auto;padding:10px 24px;display:flex;gap:24px;flex-wrap:wrap}
.stat-item{color:#fff;font-size:.8rem;opacity:.9;display:flex;align-items:center;gap:6px}
.stat-item strong{font-size:1rem;font-weight:700}
.stat-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6)}
/* MAIN CONTENT */
.main{max-width:1280px;margin:0 auto;padding:24px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:12px;padding:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab-btn{flex:1;padding:10px 16px;border:none;background:transparent;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;color:#64748b;transition:all .2s}
.tab-btn.active{background:#1a56db;color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.35)}
/* FILTERS */
.filters{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:#1a56db}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.filter-btn{padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:6px;background:#fff;font-size:.78rem;font-weight:500;cursor:pointer;color:#475569;transition:all .15s}
.filter-btn.active{background:#1a56db;border-color:#1a56db;color:#fff}
.filter-btn:hover:not(.active){background:#f1f5f9;border-color:#cbd5e1}
/* RESULTS COUNT */
.results-info{font-size:.82rem;color:#64748b;margin-bottom:12px;padding:0 2px}
/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* CARD */
.hospital-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid #e8edf2;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hospital-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#1a56db;border-radius:4px 0 0 4px}
.hospital-card:hover{box-shadow:0 6px 20px rgba(26,86,219,.15);border-color:#93c5fd;transform:translateY(-2px)}
.card-number{position:absolute;top:14px;right:14px;width:26px;height:26px;background:#f1f5f9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#94a3b8}
.card-name{font-size:.95rem;font-weight:700;color:#0f172a;margin-bottom:10px;padding-right:30px;line-height:1.4}
.card-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.badge-city{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-a8{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.badge-a90{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.badge-ext{background:#f3e8ff;color:#6b21a8;border:1px solid #d8b4fe}
.card-date{font-size:.78rem;color:#64748b;display:flex;align-items:center;gap:5px}
.card-date svg{flex-shrink:0}
.card-contact{font-size:.75rem;color:#94a3b8;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:#94a3b8}
.no-results svg{font-size:48px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.no-results p{font-size:1rem;font-weight:500}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:linear-gradient(135deg,#1a56db,#1e40af);color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
.modal-header-top{display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:1.1rem;font-weight:800;line-height:1.3;padding-right:12px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.modal-badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35)}
.modal-body{padding:20px 24px}
.modal-section{margin-bottom:18px}
.modal-section:last-child{margin-bottom:0}
.modal-section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-section-title::after{content:'';flex:1;height:1px;background:#f1f5f9}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-info-item{background:#f8fafc;border-radius:8px;padding:10px 12px}
.modal-info-label{font-size:.68rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.modal-info-value{font-size:.87rem;color:#0f172a;font-weight:600}
.contact-list{display:flex;flex-direction:column;gap:6px}
.contact-item{background:#f8fafc;border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px}
.contact-icon{width:28px;height:28px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.contact-details{flex:1;min-width:0}
.contact-role{font-size:.68rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.contact-name{font-size:.85rem;color:#0f172a;font-weight:700}
.contact-phone{font-size:.8rem;color:#1d4ed8;font-weight:500;margin-top:1px}
.modal-text-block{background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:.85rem;color:#334155;line-height:1.6}
.empty-field{font-size:.82rem;color:#cbd5e1;font-style:italic}
/* LANG TOGGLE */
.lang-toggle{margin-left:auto;display:flex;align-items:center;gap:8px}
.lang-btn{padding:6px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.lang-btn.active{background:rgba(255,255,255,.25);border-color:#fff}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.1)}
/* RESPONSIVE */
@media(max-width:640px){
  .header-inner{padding:14px 16px}
  .header-text h1{font-size:1.2rem}
  .main{padding:16px}
  .cards-grid{grid-template-columns:1fr}
  .modal-info-grid{grid-template-columns:1fr}
  .filters{padding:12px}
  .stats-inner{gap:12px}
}
</style>

// ===================== STATE =====================
let currentTab = 'machine';
let currentCity = 'All';
let currentModel = 'All';
let searchTerm = '';

// ===================== CITY LISTS =====================
function getCities(data) {
  const cities = ['All', ...new Set(data.map(h => h.city))].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b));
  return cities;
}

// ===================== RENDER CITY BUTTONS =====================
function renderCityButtons() {
  const data = currentTab === 'machine' ? machineCustomers : externalCustomers;
  const cities = getCities(data);
  const container = document.getElementById('cityFilters');
  const allLabel = currentLang === 'zh' ? '全部' : 'All';
  container.innerHTML = cities.map(c =>
    `<button class="filter-btn ${c===currentCity?'active':''}" onclick="setCity('${c}')">${c === 'All' ? allLabel : c}</button>`
  ).join('');
}

// ===================== FILTER LOGIC =====================
function getFiltered() {
  const data = currentTab === 'machine' ? machineCustomers : externalCustomers;
  return data.filter(h => {
    const matchSearch = !searchTerm ||
      h.name.toLowerCase().includes(searchTerm) ||
      h.city.toLowerCase().includes(searchTerm);
    const matchCity = currentCity === 'All' || h.city === currentCity;
    const matchModel = currentModel === 'All' || h.model === currentModel;
    return matchSearch && matchCity && matchModel;
  });
}

// ===================== RENDER CARDS =====================
function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('cardsGrid');
  const info = document.getElementById('resultsInfo');
  const total = currentTab === 'machine' ? machineCustomers.length : externalCustomers.length;
  info.textContent = `${t('showing')} ${filtered.length} ${t('of')} ${total} ${currentTab === 'machine' ? t('machineLabel') : t('externalLabel')} ${currentLang==='zh'?'客户':'customers'}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div style="font-size:48px;margin-bottom:12px">🔍</div>
      <p>${t('noResults')}</p>
      <p style="margin-top:6px;font-size:.8rem">${t('noResultsSub')}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(h => {
    const modelBadge = h.model === 'A8'
      ? `<span class="badge badge-a8">⚙ A8</span>`
      : h.model === 'A90'
      ? `<span class="badge badge-a90">⚙ A90</span>`
      : `<span class="badge badge-ext">🔬 ${currentLang==='zh'?'外部':'External'}</span>`;
    const firstContact = h.contacts[0];
    const contactPreview = firstContact
      ? `${firstContact.role}${firstContact.name ? ': '+firstContact.name : ''}${firstContact.phone ? ' · '+firstContact.phone : ''}`
      : (currentLang==='zh'?'无联系人':'No contact listed');
    const dateDisplay = h.date && h.date !== '—' && h.date
      ? `📅 ${t('installed')}: ${h.date}`
      : `📅 ${t('installNA')}`;
    return `<div class="hospital-card" onclick="openModal(${currentTab==='machine'?'machineCustomers':'externalCustomers'},${h.id-1})">
      <div class="card-number">${h.id}</div>
      <div class="card-name">${h.name}</div>
      <div class="card-badges">
        <span class="badge badge-city">📍 ${h.city}</span>
        ${modelBadge}
      </div>
      <div class="card-date">${dateDisplay}</div>
      <div class="card-contact">${contactPreview}</div>
    </div>`;
  }).join('');
}

// ===================== MODAL =====================
function openModal(datasetName, idx) {
  const dataset = datasetName === machineCustomers ? machineCustomers : externalCustomers;
  const h = dataset[idx];
  document.getElementById('modalTitle').textContent = h.name;

  // Badges
  const modelBadge = h.model === 'A8' ? `⚙ ${t('model')}: A8` : h.model === 'A90' ? `⚙ ${t('model')}: A90` : `🔬 ${t('extReagent')}`;
  document.getElementById('modalBadges').innerHTML =
    `<span class="modal-badge">📍 ${h.city}</span>
     <span class="modal-badge">${modelBadge}</span>
     ${h.date && h.date !== '—' ? `<span class="modal-badge">📅 ${h.date}</span>` : ''}`;

  // Body
  let body = '';

  // Hospital Info
  body += `<div class="modal-section">
    <div class="modal-section-title">${t('hospitalInfo')}</div>
    <div class="modal-info-grid">
      <div class="modal-info-item"><div class="modal-info-label">${t('hospitalName')}</div><div class="modal-info-value">${h.name}</div></div>
      <div class="modal-info-item"><div class="modal-info-label">${t('cityLocation')}</div><div class="modal-info-value">${h.city}</div></div>
      <div class="modal-info-item"><div class="modal-info-label">${t('model')}</div><div class="modal-info-value">${h.model === 'EXT' ? t('extReagent') : h.model}</div></div>
      <div class="modal-info-item"><div class="modal-info-label">${t('installDate')}</div><div class="modal-info-value">${h.date && h.date !== '—' ? h.date : t('na')}</div></div>
    </div>
  </div>`;

  // Contacts
  body += `<div class="modal-section">
    <div class="modal-section-title">${t('contactPersons')}</div>`;
  if (h.contacts && h.contacts.length > 0) {
    body += `<div class="contact-list">` + h.contacts.map(c =>
      `<div class="contact-item">
        <div class="contact-icon">👤</div>
        <div class="contact-details">
          <div class="contact-role">${c.role}</div>
          ${c.name ? `<div class="contact-name">${c.name}</div>` : ''}
          ${c.phone ? `<div class="contact-phone">📱 ${c.phone}</div>` : ''}
        </div>
      </div>`
    ).join('') + `</div>`;
  } else {
    body += `<div class="modal-text-block empty-field">${t('noContact')}</div>`;
  }
  body += `</div>`;

  // Payment
  if (h.payment && h.payment.length > 0) {
    body += `<div class="modal-section">
      <div class="modal-section-title">${t('paymentContacts')}</div>
      <div class="contact-list">` + h.payment.map(c =>
      `<div class="contact-item">
        <div class="contact-icon">💳</div>
        <div class="contact-details">
          <div class="contact-role">${c.role}</div>
          ${c.name ? `<div class="contact-name">${c.name}</div>` : ''}
          ${c.phone ? `<div class="contact-phone">📱 ${c.phone}</div>` : ''}
        </div>
      </div>`
    ).join('') + `</div></div>`;
  }

  // Stock
  if (h.stock) {
    body += `<div class="modal-section">
      <div class="modal-section-title">${t('stockAvailable')}</div>
      <div class="modal-text-block" style="white-space:pre-line">${h.stock}</div>
    </div>`;
  }

  // Order
  if (h.order) {
    body += `<div class="modal-section">
      <div class="modal-section-title">${t('orderNeeded')}</div>
      <div class="modal-text-block">${h.order}</div>
    </div>`;
  }

  // Doctors
  if (h.doctors) {
    body += `<div class="modal-section">
      <div class="modal-section-title">${t('numDoctors')}</div>
      <div class="modal-text-block">${h.doctors}</div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ===================== CONTROLS =====================
function switchTab(tab) {
  currentTab = tab;
  currentCity = 'All';
  currentModel = 'All';
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.filter-btn[id^="model-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('model-All').classList.add('active');
  // Show/hide model filter for external (no A8/A90)
  const modelFilter = document.querySelector('.filter-group:last-child');
  modelFilter.style.display = tab === 'external' ? 'none' : 'flex';
  renderCityButtons();
  renderCards();
}

function setCity(city) {
  currentCity = city;
  renderCityButtons();
  renderCards();
}

function setModel(model) {
  currentModel = model;
  document.querySelectorAll('.filter-btn[id^="model-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('model-' + model).classList.add('active');
  renderCards();
}

function applyFilters() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  renderCards();
}

// keyboard close modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
