<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System - Login</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-container {
  background: white;
  border-radius: 20px;
  padding: 50px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 450px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-circle {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 900;
  color: white;
  margin: 0 auto 16px;
  border: 4px solid #f0f0f0;
}

h1 {
  font-size: 1.8rem;
  color: #1e293b;
  text-align: center;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #64748b;
  font-size: 0.95rem;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: #475569;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, select {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 1rem;
  transition: all 0.2s;
  font-family: inherit;
}

input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s;
  margin-top: 8px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.btn-login:active {
  transform: translateY(0);
}

.alert {
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  display: none;
  font-size: 0.9rem;
  font-weight: 500;
}

.alert.success {
  background: #dcfce7;
  color: #166534;
  border: 2px solid #86efac;
  display: block;
}

.alert.error {
  background: #fee2e2;
  color: #991b1b;
  border: 2px solid #fca5a5;
  display: block;
}

.credentials {
  margin-top: 30px;
  padding: 20px;
  background: #f8fafc;
  border-radius: 10px;
  border: 2px solid #e2e8f0;
}

.credentials h3 {
  font-size: 0.9rem;
  color: #475569;
  margin-bottom: 12px;
  text-align: center;
}

.cred-item {
  background: white;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border-left: 4px solid #667eea;
  font-size: 0.85rem;
}

.cred-item strong {
  color: #667eea;
  display: block;
  margin-bottom: 4px;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-circle">🏥</div>
    <h1>Hospital Management</h1>
    <p class="subtitle">Login to continue</p>
  </div>

  <div id="alertBox"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>

    <button type="submit" class="btn-login">🔐 Login</button>
  </form>

  <div class="credentials">
    <h3>🔑 Default Credentials:</h3>
    <div class="cred-item">
      <strong>Admin:</strong>
      admin / admin123
    </div>
    <div class="cred-item">
      <strong>Sales (Ephrata):</strong>
      sales1 / team1
    </div>
    <div class="cred-item">
      <strong>Sales (Kalkidan):</strong>
      sales2 / team2
    </div>
    <div class="cred-item">
      <strong>Sales (Tizita):</strong>
      sales3 / team3
    </div>
  </div>
</div>

<script>
// Simple user database
const USERS = {
  admin: { 
    password: 'admin123',
    role: 'admin',
    name: 'Administrator',
    page: 'app/admin.html'
  },
  sales1: { 
    password: 'team1',
    role: 'sales',
    teamId: 1,
    name: 'Ephrata',
    page: 'app/sales.html'
  },
  sales2: { 
    password: 'team2',
    role: 'sales',
    teamId: 2,
    name: 'Kalkidan',
    page: 'app/sales.html'
  },
  sales3: { 
    password: 'team3',
    role: 'sales',
    teamId: 3,
    name: 'Tizita',
    page: 'app/sales.html'
  }
};

function showAlert(message, type) {
  const alertBox = document.getElementById('alertBox');
  alertBox.className = `alert ${type}`;
  alertBox.textContent = message;
  alertBox.style.display = 'block';
}

function handleLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  
  const user = USERS[username];
  
  if (!user) {
    showAlert('❌ Invalid username', 'error');
    return;
  }
  
  if (user.password !== password) {
    showAlert('❌ Invalid password', 'error');
    return;
  }
  
  // Save session
  const session = {
    username: username,
    role: user.role,
    teamId: user.teamId,
    name: user.name,
    loginTime: new Date().toISOString()
  };
  
  localStorage.setItem('userSession', JSON.stringify(session));
  
  showAlert('✅ Login successful! Redirecting...', 'success');
  
  // Redirect after 1 second
  setTimeout(() => {
    window.location.href = user.page;
  }, 1000);
}
</script>

</body>
</html>
