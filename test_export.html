<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Test - Fremenatos Trading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #1a56db;
            margin-bottom: 10px;
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #059669;
        }
        button.secondary {
            background: #6366f1;
        }
        button.secondary:hover {
            background: #4f46e5;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #dc2626;
        }
        .info {
            background: #dbeafe;
            color: #1e40af;
            border: 2px solid #3b82f6;
        }
        pre {
            background: #1e293b;
            color: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 Export Diagnostic Tool</h1>
        <p>Use this page to diagnose export issues.</p>
    </div>

    <div class="card">
        <h2>Step 1: Test Google Sheets Connection</h2>
        <button onclick="testConnection()">🔌 Test Connection</button>
        <div id="connectionResult"></div>
    </div>

    <div class="card">
        <h2>Step 2: Check Local Data</h2>
        <button onclick="checkLocalData()">💾 Check Local Storage</button>
        <div id="localResult"></div>
    </div>

    <div class="card">
        <h2>Step 3: Test Export Function</h2>
        <button onclick="testExport()">📥 Test Export</button>
        <button class="secondary" onclick="forceExportLocal()">📥 Force Export (Local Data)</button>
        <div id="exportResult"></div>
    </div>

    <div class="card">
        <h2>Diagnostic Info</h2>
        <button onclick="showDiagnostics()">🔍 Show All Info</button>
        <div id="diagnosticResult"></div>
    </div>

    <script>
        // Your Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwd3Xpe2LTQeJ84XCWpJ-HTepFOC2aLSB-aSJJ6Ff0atg1ISiIW9E8Sl295qnKYghVIvQ/exec';

        function showResult(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div id="result" class="${type}">${message}</div>`;
        }

        async function testConnection() {
            showResult('connectionResult', '⏳ Testing connection...', 'info');
            
            try {
                console.log('Fetching from:', SCRIPT_URL);
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                console.log('Response:', data);
                
                if (data.status === 'ok') {
                    const count = data.data ? data.data.length : 0;
                    showResult('connectionResult', 
                        `✅ SUCCESS!\n\nConnection works perfectly!\nFound ${count} reports in Google Sheets.\n\nGoogle Sheets URL: ${SCRIPT_URL}`, 
                        'success');
                } else {
                    showResult('connectionResult', 
                        `⚠️ CONNECTION OK but unexpected response:\n\n${JSON.stringify(data, null, 2)}`, 
                        'error');
                }
            } catch (error) {
                console.error('Connection error:', error);
                showResult('connectionResult', 
                    `❌ CONNECTION FAILED\n\nError: ${error.message}\n\nPossible causes:\n1. Google Apps Script not deployed\n2. Wrong SCRIPT_URL\n3. Internet connection issue\n4. CORS policy blocking request\n\nURL being tested:\n${SCRIPT_URL}`, 
                    'error');
            }
        }

        function checkLocalData() {
            try {
                const localReports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
                
                if (localReports.length === 0) {
                    showResult('localResult', 
                        `⚠️ NO LOCAL DATA\n\nNo reports found in browser storage.\nThis means:\n- You haven't submitted any reports on THIS browser\n- Or browser data was cleared\n\nSolution: Submit a report first, or use Google Sheets data.`, 
                        'error');
                } else {
                    showResult('localResult', 
                        `✅ LOCAL DATA FOUND!\n\nFound ${localReports.length} reports in browser storage.\n\nFirst report:\nHospital: ${localReports[0].hospitalName || 'Unknown'}\nDate: ${localReports[0].fillDate || 'No date'}\nSalesperson: ${localReports[0].salesPerson || 'Unknown'}`, 
                        'success');
                }
            } catch (error) {
                showResult('localResult', 
                    `❌ ERROR reading local storage:\n\n${error.message}`, 
                    'error');
            }
        }

        async function testExport() {
            showResult('exportResult', '⏳ Testing export...', 'info');
            
            try {
                // First try to get data from Google Sheets
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                let reports = [];
                if (data.status === 'ok' && data.data && data.data.length > 0) {
                    reports = data.data;
                    console.log('Using Google Sheets data:', reports.length);
                } else {
                    // Fallback to local storage
                    reports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
                    console.log('Using local storage data:', reports.length);
                }
                
                if (reports.length === 0) {
                    showResult('exportResult', 
                        `❌ NO DATA TO EXPORT\n\nNeither Google Sheets nor local storage has any reports.\n\nSolution:\n1. Go back to main app\n2. Submit at least one report\n3. Come back and try again`, 
                        'error');
                    return;
                }
                
                // Create simple CSV
                let csv = 'Hospital Name,Salesperson,Date,Address,Phone\n';
                reports.slice(0, 5).forEach(r => {
                    csv += `"${r.hospitalName || ''}","${r.salesPerson || ''}","${r.fillDate || ''}","${r.hospitalAddress || ''}","${r.phone || ''}"\n`;
                });
                
                // Create and download file
                const BOM = '\uFEFF';
                const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'test_export.csv';
                link.click();
                
                showResult('exportResult', 
                    `✅ EXPORT SUCCESSFUL!\n\nExported ${reports.length} reports.\nFile should be downloading now.\n\nIf file didn't download:\n- Check your Downloads folder\n- Check if browser blocked the download\n- Check pop-up blocker settings`, 
                    'success');
                    
            } catch (error) {
                console.error('Export error:', error);
                showResult('exportResult', 
                    `❌ EXPORT FAILED\n\nError: ${error.message}\n\nStack trace:\n${error.stack}`, 
                    'error');
            }
        }

        function forceExportLocal() {
            showResult('exportResult', '⏳ Forcing local export...', 'info');
            
            try {
                const reports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
                
                if (reports.length === 0) {
                    showResult('exportResult', 
                        `❌ No local data to export.\n\nSubmit reports first in the main app.`, 
                        'error');
                    return;
                }
                
                // Create simple JSON export
                const json = JSON.stringify(reports, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'local_reports_backup.json';
                link.click();
                
                showResult('exportResult', 
                    `✅ LOCAL EXPORT SUCCESSFUL!\n\nExported ${reports.length} reports from local storage.\nFile: local_reports_backup.json\n\nYou can open this file in Excel or any JSON viewer.`, 
                    'success');
                    
            } catch (error) {
                showResult('exportResult', 
                    `❌ EXPORT FAILED\n\nError: ${error.message}`, 
                    'error');
            }
        }

        function showDiagnostics() {
            const info = {
                'Browser': navigator.userAgent,
                'Script URL Set': SCRIPT_URL ? 'YES' : 'NO',
                'Script URL': SCRIPT_URL,
                'Local Storage Available': typeof(Storage) !== 'undefined' ? 'YES' : 'NO',
                'Local Reports Count': (JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]')).length,
                'Current Time': new Date().toLocaleString(),
                'Page URL': window.location.href
            };
            
            let html = '<pre>';
            for (const [key, value] of Object.entries(info)) {
                html += `${key}: ${value}\n`;
            }
            html += '</pre>';
            
            showResult('diagnosticResult', html, 'info');
        }

        // Auto-run connection test on load
        window.onload = function() {
            console.log('Test page loaded. SCRIPT_URL:', SCRIPT_URL);
        };
    </script>
</body>
</html>
