<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1e293b; padding: 20px; }
.header { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: #fff; padding: 30px; border-radius: 12px; margin-bottom: 20px; }
.header h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
.header p { opacity: 0.9; font-size: 1rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
.stat-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid; }
.stat-card.hot { border-color: #dc2626; }
.stat-card.warm { border-color: #f59e0b; }
.stat-card.high { border-color: #059669; }
.stat-number { font-size: 2.5rem; font-weight: 900; margin-bottom: 8px; }
.stat-label { font-size: 0.9rem; color: #64748b; font-weight: 600; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #fff; border-radius: 12px; padding: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.tab { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; color: #64748b; transition: all 0.2s; }
.tab.active { background: #dc2626; color: #fff; }
.tab.hot:hover { background: #fee2e2; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid; transition: all 0.2s; cursor: pointer; }
.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.15); transform: translateY(-2px); }
.card.hot { border-color: #dc2626; }
.card.warm { border-color: #f59e0b; }
.card.cold { border-color: #94a3b8; }
.card-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; margin-bottom: 12px; }
.card-status.hot { background: #fee2e2; color: #dc2626; }
.card-status.warm { background: #fef3c7; color: #92400e; }
.card-status.cold { background: #f1f5f9; color: #64748b; }
.card-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
.card-info { font-size: 0.85rem; color: #64748b; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.card-notes { background: #ecfdf5; border-left: 3px solid: #059669; padding: 12px; border-radius: 6px; margin-top: 12px; font-size: 0.85rem; color: #065f46; font-weight: 600; line-height: 1.5; }
.card-contact { background: #f8fafc; padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 0.85rem; }
.card-contact strong { color: #1e293b; display: block; margin-bottom: 4px; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #dc2626; color: #fff; }
.btn-primary:hover { background: #991b1b; }
.btn-secondary { background: #f1f5f9; color: #64748b; }
.btn-secondary:hover { background: #e2e8f0; }
.filter-bar { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filter-bar input { flex: 1; min-width: 250px; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; }
.filter-bar select { padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-weight: 600; }
.no-data { text-align: center; padding: 60px 20px; color: #94a3b8; }
.priority-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; margin-left: 8px; }
.priority-high { background: #dcfce7; color: #166534; }
.priority-medium { background: #fef3c7; color: #92400e; }
.priority-low { background: #f1f5f9; color: #64748b; }

let currentFilter = 'hot';

function renderCards(filter = 'hot') {
  const container = document.getElementById('customerCards');
  let filtered = customers;
  
  if (filter === 'hot') {
    filtered = customers.filter(c => c.status === 'HOT');
  } else if (filter === 'warm') {
    filtered = customers.filter(c => c.status === 'WARM');
  } else if (filter === 'accre') {
    filtered = customers.filter(c => c.accreInterest === true);
  }
  
  const salesRep = document.getElementById('salesRepFilter').value;
  if (salesRep !== 'all') {
    filtered = filtered.filter(c => c.salesRep === salesRep);
  }
  
  const volume = document.getElementById('volumeFilter').value;
  if (volume === 'high') {
    filtered = filtered.filter(c => c.patientLoad.includes('>20') || c.patientLoad.includes('50') || c.patientLoad.includes('70'));
  } else if (volume === 'medium') {
    filtered = filtered.filter(c => c.patientLoad.includes('10-20') || c.patientLoad.includes('15-20') || c.patientLoad.includes('10-15'));
  } else if (volume === 'low') {
    filtered = filtered.filter(c => c.patientLoad.includes('<') || c.patientLoad.includes('2-5') || c.patientLoad.includes('3-5') || c.patientLoad.includes('5-10') || c.patientLoad.includes('5/'));
  }
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="font-size:1.2rem;font-weight:700">No customers match your filters</p></div>';
    return;
  }
  
  container.innerHTML = filtered.map(c => `
    <div class="card ${c.status.toLowerCase()}">
      <span class="card-status ${c.status.toLowerCase()}">${c.status === 'HOT' ? '🔥' : c.status === 'WARM' ? '🌡️' : '❄️'} ${c.status}</span>
      <span class="priority-badge priority-${c.potential.toLowerCase()}">${c.potential} Priority</span>
      <div class="card-name">${c.name}</div>
      <div class="card-info">📍 ${c.address} • 👤 ${c.salesRep}</div>
      <div class="card-info">📊 Patient Load: <strong>${c.patientLoad}</strong></div>
      <div class="card-info">🔬 Equipment: ${c.equipment}</div>
      ${c.notes ? `<div class="card-notes">💡 ${c.notes}</div>` : ''}
      <div class="card-contact">
        <strong>📞 Contact:</strong>
        ${c.contact.name} (${c.contact.role})<br>
        ${c.contact.phone ? `Phone: ${c.contact.phone}` : 'No phone'}
      </div>
      <div class="card-actions">
        <button class="btn btn-primary" onclick="alert('Call ${c.contact.phone}')">📞 Call Now</button>
        <button class="btn btn-secondary" onclick="alert('Email: Contact about ${c.name}')">✉️ Email</button>
      </div>
    </div>
  `).join('');
}

function filterBy(type) {
  currentFilter = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(type);
}

function filterCustomers() {
  renderCards(currentFilter);
}

function searchCustomers() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const cards = document.querySelectorAll('.card');
  
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(search) ? 'block' : 'none';
  });
}
