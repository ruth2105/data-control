<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Kalkidan Summaries</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a56db;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }
        button {
            background: #1a56db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #1e40af;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
        }
        .success {
            color: #065f46;
            background: #dcfce7;
            border-color: #86efac;
        }
        .error {
            color: #991b1b;
            background: #fee2e2;
            border-color: #fca5a5;
        }
        .info {
            color: #1e40af;
            background: #dbeafe;
            border-color: #93c5fd;
        }
        .log-item {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            background: white;
            font-size: 14px;
        }
        .log-success { border-left: 4px solid #10b981; }
        .log-warning { border-left: 4px solid #f59e0b; }
        .log-error { border-left: 4px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Import Kalkidan's Hospital Summaries</h1>
        <p class="subtitle">Import 27 hospital summaries for Kalkidan's territory</p>
        
        <div style="margin: 20px 0;">
            <p><strong>📊 Total Summaries:</strong> 27 hospitals</p>
            <p><strong>👤 Sales Person:</strong> Kalkidan</p>
        </div>

        <div style="margin: 30px 0;">
            <button onclick="importSummaries()" id="importBtn">🚀 Start Import</button>
            <button onclick="window.location.href='../../app/admin.html'">← Back to Admin</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const SUMMARIES = [
            {name:"lotus mch",summary:"Lotus Mch is a hot priority facility located in Garment. They currently use Finecare for hormone testing, Mindray for chemistry, and B&E for electrolyte analysis. The facility has an estimated patient load of 10–20 tests/day and requires SST, EDTA tubes. Current opportunity: Interested in reagent placement; requested comparative analysis. Continued follow-up with Head Lab Technician, Medical Director is recommended to advance the opportunity."},
            {name:"novamed clinic",summary:"Novamed Clinic is a hot priority facility located in goro. They currently use Finecare for hormone testing, none for chemistry, and Interested in B&E Electrolyte for electrolyte analysis. The facility has an estimated patient load of 10–15 tests/day and requires SST, EDTA tubes. Current opportunity: Interested in electrolyte analyzer. Continued follow-up with Zeaman (Laboratory Head) is recommended to advance the opportunity."},
            {name:"ajora mch",summary:"Ajora Mch is a hot priority facility located in summit. They currently use finecare for hormone testing, siesmen semiautomatic for chemistry, and B&E for electrolyte analysis. The facility has an estimated patient load of 10–20 tests/day and requires SST, EDTA tubes. Current opportunity: Interested in Accree placement. Continued follow-up with Tina (Laboratory Head) is recommended to advance the opportunity."},
            {name:"yadon clinic",summary:"Yadon Clinic is a hot priority facility located in ayat. They currently use Finecare for hormone testing, none for chemistry, and semi automated un specified analyzer for electrolyte analysis. The facility has an estimated patient load of >10 tests/day and requires SST, EDTA tubes. Current opportunity: Proposal under stakeholder review. Continued follow-up with Owner, Head Lab Technician is recommended to advance the opportunity."},
            {name:"hewan gynecology specialized clinic",summary:"Hewan Gynecology Specialized Clinic is a hot priority facility located in jemo. They currently use none for hormone testing, semi-automated dirui for chemistry, and None for electrolyte analysis. The facility has an estimated patient load of 10–15 tests/day and requires SST, EDTA tubes. Current opportunity: Planning to purchase hormone analyzer. Continued follow-up with Medical Director/Owner is recommended to advance the opportunity."},
            {name:"yerer general hospital",summary:"Yerer General Hospital is a hot priority facility located in yerer. They currently use Finecare, Zybio, Maglumi for hormone testing, Mindray for chemistry, and fully automated un specified anlyzer for electrolyte analysis. The facility has an estimated patient load of >20 tests/day and requires SST, EDTA tubes. Current opportunity: Considering ACCRE as an additional analyzer. Continued follow-up with Head Lab Technician is recommended to advance the opportunity."},
            {name:"st. mary medium clinic",summary:"St. Mary Medium Clinic is a hot priority facility located in goro. They currently use none for hormone testing, semi automated for chemistry, and CBS 401 B&E for electrolyte analysis. The facility has an estimated patient load of 10–15 tests/day and requires SST, EDTA tubes. Current opportunity: Evaluating installation of hormone analyzer. Continued follow-up with Medical Director is recommended to advance the opportunity."},
            {name:"tersis clinics",summary:"Tersis Clinics is a hot priority facility located in lamberet. They currently use vidas for hormone testing, semi automated for chemistry, and semi automated un specified analyzer for electrolyte analysis. The facility has an estimated patient load of 5 tests/day and requires SST, EDTA tubes. Current opportunity: Strong interest and expansion potential. Continued follow-up with Liyu Tersis Clinic Lab is recommended to advance the opportunity."},
            {name:"gfb specialized clinic",summary:"Gfb Specialized Clinic is a hot priority facility located in ayat. They currently use fine care for hormone testing, semi automated for chemistry, and semi automated un specified analyzer for electrolyte analysis. The facility has an estimated patient load of 2_5 tests/day and requires SST, EDTA tubes. Current opportunity: Good potential. Continued follow-up with Laboratory Professionals is recommended to advance the opportunity."},
            {name:"betsegah mch",summary:"Betsegah Mch is a hot priority facility located in gurdshola. They currently use finecare,Maglumi for hormone testing, semi automated for chemistry, and Potential for B&E for electrolyte analysis. The facility has an estimated patient load of >20 tests/day and requires SST, EDTA tubes. Current opportunity: Awaiting management feedback. Continued follow-up with Head Purchaser is recommended to advance the opportunity."},
            {name:"abebech gobena mch",summary:"Abebech Gobena Mch is a hot priority facility located in ayat tsehel. They currently use Not specified for hormone testing, siesmen semiautomatic for chemistry, and CBS 50 for electrolyte analysis. The facility has an estimated patient load of 15–20 tests/day and requires SST, EDTA tubes. Current opportunity: Strong interest in placement model. Continued follow-up with Dani (Laboratory Head) is recommended to advance the opportunity."},
            {name:"ethiocare medical center",summary:"Ethiocare Medical Center is a warm priority facility located in garment. They currently use Mindray CLIA (inactive) for hormone testing, semi automated for chemistry, and Edgelayt 3 for electrolyte analysis. The facility has an estimated patient load of 5–10 tests/day and requires SST, EDTA tubes. Current opportunity: Evaluating chemistry analyzer suppliers. Continued follow-up with Purchasing Officer is recommended to advance the opportunity."},
            {name:"mary clinic",summary:"Mary Clinic is a warm priority facility located in 72.0. They currently use none for hormone testing, semi automated for chemistry, and Potential for B&E for electrolyte analysis. The facility has an estimated patient load of 5–10 tests/day and requires SST, EDTA tubes. Current opportunity: Planning to buy hormone analyzer next year. Continued follow-up with Head Lab Technician, Owner is recommended to advance the opportunity."},
            {name:"fikreselam general hospital",summary:"Fikreselam General Hospital is a warm priority facility located in cmc. They currently use Not specified for hormone testing, fully automated for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of 10–15 tests/day and requires SST, EDTA tubes. Current opportunity: Follow-up meeting scheduled. Continued follow-up with Head Lab Technician is recommended to advance the opportunity."},
            {name:"ebm specialty clinic",summary:"Ebm Specialty Clinic is a warm priority facility located in ayat. They currently use Finecare, BiG for hormone testing, semi automated for chemistry, and B&E for electrolyte analysis. The facility has an estimated patient load of 3–5 tests/day and requires SST, EDTA tubes. Current opportunity: Considering analyzer upgrade. Continued follow-up with Abebe (Laboratory Head) is recommended to advance the opportunity."},
            {name:"dr. yared pediatric clinic",summary:"Dr. Yared Pediatric Clinic is a warm priority facility located in horo. They currently use Finecare for hormone testing, semi automated for chemistry, and B&E for electrolyte analysis. The facility has an estimated patient load of Under evaluation and requires SST, EDTA tubes. Current opportunity: Will consider as patient flow increases. Continued follow-up with Elias Lab is recommended to advance the opportunity."},
            {name:"ag kovamed clinic",summary:"Ag Kovamed Clinic is a warm priority facility located in 72.0. They currently use Finecare for hormone testing, not specified for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of Low and requires SST, EDTA tubes. Current opportunity: Interested in electrolyte analyzer. Continued follow-up with Head of Laboratory is recommended to advance the opportunity."},
            {name:"agar specialized clinic",summary:"Agar Specialized Clinic is a warm priority facility located in ayst. They currently use fine care for hormone testing, None for chemistry, and Potential for B&E for electrolyte analysis. The facility has an estimated patient load of 5–10 tests/day and requires SST, EDTA tubes. Current opportunity: Interested in Accree analyzer. Continued follow-up with Dr. Eyasu is recommended to advance the opportunity."},
            {name:"rubira medical center",summary:"Rubira Medical Center is a cold priority facility located in summit. They currently use Zybio for hormone testing, not specified for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of 3–5 tests/day and requires SST, EDTA tubes. Current opportunity: Satisfied with current analyzer. Continued follow-up with Laboratory Technician is recommended to advance the opportunity."},
            {name:"kidist selamihret clinic",summary:"Kidist Selamihret Clinic is a cold priority facility located in summit72. They currently use none for hormone testing, not specified for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of <5 tests/day and requires SST, EDTA tubes. Current opportunity: Low patient flow. Continued follow-up with Head Lab Technician is recommended to advance the opportunity."},
            {name:"cheza medium clinic",summary:"Cheza Medium Clinic is a cold priority facility located in wossen. They currently use Finecare for hormone testing, not specified for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of ~2 tests/day and requires SST, EDTA tubes. Current opportunity: Already decided on Finecare. Continued follow-up with Owner is recommended to advance the opportunity."},
            {name:"lancet internal medical center",summary:"Lancet Internal Medical Center is a cold priority facility located in megenagna. They currently use Maglumi, Finecare for hormone testing, not specified for chemistry, and not specified for electrolyte analysis. The facility has an estimated patient load of <5 tests/day and requires SST, EDTA tubes. Current opportunity: Low patient volume. Continued follow-up with Head Nurse, Lab Technician is recommended to advance the opportunity."},
            {name:"dr. saba clinic",summary:"Dr. Saba Clinic is a cold priority facility located in ajora. They currently use Finecare for hormone testing, conas for chemistry, and None for electrolyte analysis. The facility has an estimated patient load of <5 tests/day and requires SST, EDTA tubes. Current opportunity: No interest in additional analyzer. Continued follow-up with Laboratory Staff is recommended to advance the opportunity."},
            {name:"enat clinic",summary:"Enat Clinic is a cold priority facility located in megenagna. They currently use Finecare for hormone testing, siesmen for chemistry, and none for electrolyte analysis. The facility has an estimated patient load of <5 tests/day and requires SST, EDTA tubes. Current opportunity: Financial constraints. Continued follow-up with Enat Clinic Owners is recommended to advance the opportunity."},
            {name:"eldana clinic",summary:"Eldana Clinic is a cold priority facility located in megenagna. They currently use Zybio for hormone testing, mindray for chemistry, and Band E for electrolyte analysis. The facility has an estimated patient load of 10–20 tests/day and requires SST, EDTA tubes. Current opportunity: Recently purchased Zybio. Continued follow-up with medical director is recommended to advance the opportunity."},
            {name:"dr. asaye clinic",summary:"Dr. Asaye Clinic is a cold priority facility located in summit. They currently use Finecare for hormone testing, none for chemistry, and none for electrolyte analysis. The facility has an estimated patient load of <5 tests/day and requires SST, EDTA tubes. Current opportunity: Satisfied with current setup. Continued follow-up with Laboratory Professional is recommended to advance the opportunity."},
            {name:"care plus addis clinic",summary:"Care Plus Addis Clinic is a cold priority facility located in gurdshola. They currently use VIDAS for hormone testing, not specified for chemistry, and mot specified for electrolyte analysis. The facility has an estimated patient load of 0–3 tests/day and requires EDTA, SST tubes. Current opportunity: Low patient flow and infrastructure challenges. Continued follow-up with Head Lab, Medical Director is recommended to advance the opportunity."}
        ];

        async function importSummaries() {
            const btn = document.getElementById('importBtn');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            btn.textContent = '⏳ Importing...';
            results.className = 'info';
            results.innerHTML = '<p><strong>Starting import...</strong></p>';
            
            // Load ALL possible data sources from localStorage
            let potentialCustomers = JSON.parse(localStorage.getItem('fremenatos_potentials') || '[]');
            let visitReports = JSON.parse(localStorage.getItem('fremenatos_visitReports') || '[]');
            let machineCustomers = JSON.parse(localStorage.getItem('fremenatos_machine') || '[]');
            let externalCustomers = JSON.parse(localStorage.getItem('fremenatos_external') || '[]');
            
            console.log('Data sources:', {
                potentials: potentialCustomers.length,
                reports: visitReports.length,
                machine: machineCustomers.length,
                external: externalCustomers.length
            });
            
            let updated = 0;
            let notFound = 0;
            let logs = [];
            
            SUMMARIES.forEach(item => {
                const hospitalName = item.name.trim();
                const hospitalNameLower = hospitalName.toLowerCase();
                const summary = item.summary;
                let found = false;
                
                // Search in potential customers
                const potIndex = potentialCustomers.findIndex(c => 
                    (c.name && c.name.toLowerCase() === hospitalNameLower) ||
                    (c.hospitalName && c.hospitalName.toLowerCase() === hospitalNameLower)
                );
                if (potIndex !== -1) {
                    potentialCustomers[potIndex].notes = summary;
                    found = true;
                    updated++;
                    logs.push(`<div class="log-item log-success">✅ Updated in Potentials: ${item.name}</div>`);
                }
                
                // Search in visit reports
                const reportIndex = visitReports.findIndex(c => 
                    (c.name && c.name.toLowerCase() === hospitalNameLower) ||
                    (c.hospitalName && c.hospitalName.toLowerCase() === hospitalNameLower)
                );
                if (reportIndex !== -1) {
                    visitReports[reportIndex].notes = summary;
                    if (!found) {
                        found = true;
                        updated++;
                    }
                    logs.push(`<div class="log-item log-success">✅ Updated in Visit Reports: ${item.name}</div>`);
                }
                
                // Search in machine customers
                const machineIndex = machineCustomers.findIndex(c => 
                    (c.name && c.name.toLowerCase() === hospitalNameLower) ||
                    (c.hospitalName && c.hospitalName.toLowerCase() === hospitalNameLower)
                );
                if (machineIndex !== -1) {
                    machineCustomers[machineIndex].notes = summary;
                    if (!found) {
                        found = true;
                        updated++;
                    }
                    logs.push(`<div class="log-item log-success">✅ Updated in Machine Customers: ${item.name}</div>`);
                }
                
                // Search in external customers
                const extIndex = externalCustomers.findIndex(c => 
                    (c.name && c.name.toLowerCase() === hospitalNameLower) ||
                    (c.hospitalName && c.hospitalName.toLowerCase() === hospitalNameLower)
                );
                if (extIndex !== -1) {
                    externalCustomers[extIndex].notes = summary;
                    if (!found) {
                        found = true;
                        updated++;
                    }
                    logs.push(`<div class="log-item log-success">✅ Updated in External Customers: ${item.name}</div>`);
                }
                
                // Also add to facility summaries storage for display
                const facilitySummaries = JSON.parse(localStorage.getItem('fremenatos_facility_summaries') || '{}');
                facilitySummaries[item.name] = summary;
                // Also save with proper case
                facilitySummaries[hospitalName] = summary;
                localStorage.setItem('fremenatos_facility_summaries', JSON.stringify(facilitySummaries));
                
                if (!found) {
                    notFound++;
                    logs.push(`<div class="log-item log-warning">⚠️ Not found in any storage: ${item.name}</div>`);
                }
            });
            
            // Save all updated data back to localStorage
            localStorage.setItem('fremenatos_potentials', JSON.stringify(potentialCustomers));
            localStorage.setItem('fremenatos_visitReports', JSON.stringify(visitReports));
            localStorage.setItem('fremenatos_machine', JSON.stringify(machineCustomers));
            localStorage.setItem('fremenatos_external', JSON.stringify(externalCustomers));
            
            // Show results
            results.className = updated > 0 ? 'success' : 'error';
            results.innerHTML = `
                <h3>Import Complete!</h3>
                <p><strong>✅ Updated:</strong> ${updated} hospitals (summaries added to matching records)</p>
                <p><strong>✅ Facility Summaries:</strong> ${SUMMARIES.length} summaries saved for display</p>
                <p><strong>⚠️ Not Found:</strong> ${notFound} hospitals (summaries still saved for display)</p>
                <hr style="margin: 15px 0;">
                <div style="max-height: 400px; overflow-y: auto;">
                    ${logs.join('')}
                </div>
            `;
            
            btn.textContent = '✅ Import Complete';
            
            if (notFound > 0) {
                results.innerHTML += `
                    <div style="margin-top: 15px; padding: 10px; background: #dbeafe; border: 2px solid #3b82f6; border-radius: 6px;">
                        <strong>ℹ️ Note:</strong> Even if hospitals weren't found in existing records, all ${SUMMARIES.length} summaries were saved to "fremenatos_facility_summaries" storage and will display when viewing hospital reports in admin/sales pages.
                        <br><br>
                        ${notFound} hospitals were not found in existing customer/visit records, but their summaries are still available for display.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
