<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System - Quick Start</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 20px;
  padding: 60px 50px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 600px;
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 2.5rem;
  color: #1e293b;
  margin-bottom: 20px;
  font-weight: 800;
}

.subtitle {
  font-size: 1.1rem;
  color: #64748b;
  margin-bottom: 40px;
}

.button-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 40px;
}

.btn {
  padding: 20px 40px;
  border: none;
  border-radius: 12px;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  display: block;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.btn-admin {
  background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
  color: white;
}

.btn-sales {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
}

.btn-register {
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  color: white;
}

.info-box {
  background: #f1f5f9;
  border: 2px solid #cbd5e1;
  border-radius: 12px;
  padding: 20px;
  margin-top: 30px;
  text-align: left;
}

.info-box h3 {
  color: #1e293b;
  margin-bottom: 12px;
  font-size: 1.1rem;
}

.credentials {
  font-family: 'Courier New', monospace;
  background: white;
  padding: 12px;
  border-radius: 6px;
  margin: 8px 0;
  border-left: 4px solid #3b82f6;
}

.credentials strong {
  color: #1e40af;
}
</style>
</head>
<body>

<div class="container">
  <h1>🏥 Hospital Management System</h1>
  <p class="subtitle">Choose how you want to access the system</p>

  <div class="button-group">
    <button class="btn btn-admin" onclick="openAdmin()">
      👨‍💼 Admin Dashboard
    </button>

    <button class="btn btn-sales" onclick="openSales()">
      💼 Sales Dashboard
    </button>

    <button class="btn btn-register" onclick="openRegister()">
      📝 Login / Register
    </button>
  </div>

  <div class="info-box">
    <h3>🔑 Default Login Credentials:</h3>
    
    <div class="credentials">
      <strong>Admin:</strong><br>
      Username: admin<br>
      Password: admin123
    </div>

    <div class="credentials">
      <strong>Sales (Ephrata):</strong><br>
      Username: sales1<br>
      Password: team1
    </div>

    <div class="credentials">
      <strong>Sales (Kalkidan):</strong><br>
      Username: sales2<br>
      Password: team2
    </div>

    <div class="credentials">
      <strong>Sales (Tizita):</strong><br>
      Username: sales3<br>
      Password: team3
    </div>
  </div>
</div>

<script>
function openAdmin() {
  // Open in same tab to avoid path issues
  window.location.href = 'app/admin.html';
}

function openSales() {
  // Open in same tab to avoid path issues
  window.location.href = 'app/sales.html';
}

function openRegister() {
  // Open in same tab to avoid path issues
  window.location.href = 'app/register.html';
}
</script>

</body>
</html>
